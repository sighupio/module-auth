[env]
# Default values for local development
KUBE_VERSION = "1.35.0"
DRONE_BUILD_NUMBER = "9999"
DRONE_REPO_NAME = "module-auth"

[tools]
bats = "1.11.0"
drone = "1.9.0"
dyff = "1.9.0"
envsubst = "1.4.3"
helm = "3.15.0"
kapp = "0.65.3"
kind = "0.32.0"
kube-linter = "0.8.3"
kubectl = "1.35.6"
kustomize = "5.6.0"
yq = "4.53.3"
"ubi:google/addlicense" = "v1.1.1"

# Development task definitions
[tasks.add-license]
description = "Add license headers to all files"
run = '''
echo "📄 Adding license headers..."
addlicense -c "SIGHUP s.r.l" -y "2017-present" -v -l bsd .
echo "✅ License headers added!"
'''

[tasks.check-license]
description = "Check that all files have license headers"
run = '''
echo "🔍 Checking license headers..."
addlicense -c "SIGHUP s.r.l" -y "2017-present" -v -l bsd --check .
echo "✅ All files have license headers!"
'''

[tasks.validate-manifests]
description = "Validate all manifests can be built"
run = '''
echo "🔍 Validating manifest builds..."
kustomize build katalog/tests/manifests/pomerium > /dev/null && echo "  ✅ pomerium"
kustomize build katalog/tests/manifests/dex > /dev/null && echo "  ✅ dex"
kustomize build katalog/tests/manifests/gangplank > /dev/null && echo "  ✅ gangplank"
kustomize build katalog/tests/manifests > /dev/null && echo "  ✅ complete auth stack"
echo "✅ All manifests validated!"
'''

[tasks.lint]
description = "Lint all katalog manifests with kube-linter"
run = '''
echo "🔍 Linting katalog/ with kube-linter..."
kube-linter lint --config .kube-linter.yaml katalog/
echo "✅ All manifests passed linting!"
'''

[tasks.e2e-create-cluster]
description = "Create Kind cluster for E2E testing"
run = "./scripts/create-e2e-cluster.sh"

[tasks.e2e-run-tests]
description = "Run E2E tests on existing cluster"
run = "./scripts/run-e2e-tests.sh"

[tasks.e2e-cleanup-cluster]
description = "Clean up E2E test cluster and artifacts"
run = "./scripts/cleanup-e2e-cluster.sh"

[tasks.e2e]
description = "Run complete E2E workflow: create → test → cleanup"
run = '''
echo "🚀 Running complete E2E workflow..."
mise run e2e-create-cluster
mise run e2e-run-tests  
mise run e2e-cleanup-cluster
echo "✅ E2E workflow completed!"
'''

